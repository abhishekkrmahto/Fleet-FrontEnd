<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANTOSH OS - Upload Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }</style>
</head>
<body class="text-slate-800 p-4">

    <div class="max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center mb-2">
            <a href="index.html" class="text-xs font-bold text-slate-500 bg-slate-200 px-3 py-2 rounded-xl">⬅️ Back to Logs</a>
            <span class="text-xs font-extrabold text-slate-900">Document Upload</span>
        </div>

        <section class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-2 mb-2">
                <span class="text-lg">📁</span>
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400">Compliance Upload Hub</h2>
            </div>
            <p class="text-[10px] text-slate-400 mb-4">Saved PDF files sync here. Owner will receive instant notification and daily alerts before 10 days of expiry.</p>

            <form id="docForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">Target Fleet Vehicle</label>
                    <select id="truckUploadSelect" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-700 focus:outline-none" required>
                        <option value="">-- Choose Truck --</option>
                    </select>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">Paper / Tax Classification</label>
                        <select id="doc_type" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none">
                            <option value="Road Tax Paper">Road Tax Paper</option>
                            <option value="National Permit Paper">National Permit Paper</option>
                            <option value="Fitness Certificate">Fitness Certificate</option>
                            <option value="Commercial Insurance">Commercial Insurance</option>
                            <option value="Pollution Certificate (PUC)">Pollution Certificate (PUC)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1">Expiry Date</label>
                        <input type="date" id="doc_expiry" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none" required>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">Choose PDF / Image Scanned File</label>
                    <input type="file" id="doc_file" class="w-full text-xs text-slate-400 file:mr-2 file:py-2 file:px-3 file:rounded-xl file:border-0 file:text-[11px] file:font-bold file:bg-slate-900 file:text-white" required>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold text-xs py-3.5 rounded-xl active:scale-95 transition cursor-pointer">
                    Upload & Secure Digital Copy
                </button>
            </form>
        </section>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";

        async function loadTruckDropdown() {
            const res = await fetch(`${API_URL}/trucks`);
            const data = await res.json();
            const select = document.getElementById('truckUploadSelect');
            data.forEach(t => {
                select.innerHTML += `<option value="${t.truck_number}">${t.truck_number}</option>`;
            });
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => resolve(r.result); r.onerror = err => reject(err);
        });

        document.getElementById('docForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('doc_file').files[0];
            const base64Str = await toBase64(file);

            const payload = {
                truckNumber: document.getElementById('truckUploadSelect').value,
                documentType: document.getElementById('doc_type').value,
                expiryDate: document.getElementById('doc_expiry').value,
                fileBase64: base64Str
            };

            const res = await fetch(`${API_URL}/docs/upload`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                alert("PDF Securely Archived! Confirmation triggered to owner inbox.");
                document.getElementById('docForm').reset();
            }
        });

        loadTruckDropdown();
    </script>
</body>
</html>
