<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANTOSH OS - Fleet Setup</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }</style>
</head>
<body class="text-slate-800 p-4">

    <div class="max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center mb-2">
            <a href="index.html" class="text-xs font-bold text-slate-500 bg-slate-200 px-3 py-2 rounded-xl">⬅️ Back to Logs</a>
            <span class="text-xs font-extrabold text-slate-900">Fleet Master</span>
        </div>

        <section class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-lg">🚚</span>
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400">Add New Truck</h2>
            </div>
            <p class="text-[11px] text-slate-400 mb-4">Once added, the truck will instantly sync in all dropdown menus across pages.</p>
            
            <form id="addTruckForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1">Vehicle License Plate Number</label>
                    <input type="text" id="new_truck_number" placeholder="e.g. JH-01-AM-9999" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm uppercase font-bold focus:outline-none focus:border-slate-900" required>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-bold text-xs py-3.5 rounded-xl active:scale-95 transition cursor-pointer">
                    Onboard Vehicle & Alert Owner Email
                </button>
            </form>
        </section>
    </div>

    <script>
        document.getElementById('addTruckForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('new_truck_number');
            const res = await fetch("http://localhost:5000/api/trucks/add", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ truck_number: input.value })
            });
            if(res.ok) {
                alert(`Vehicle ${input.value.toUpperCase()} added! Confirmation email sent.`);
                input.value = '';
            } else {
                alert("Truck Already Registered!");
            }
        });
    </script>
</body>
</html>
