<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTOSH VAULT - Upload Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }</style>
</head>
<body class="text-neutral-800">

    <nav class="bg-white border-b border-neutral-100 sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center md:max-w-xl">
            <h1 class="text-base font-bold text-neutral-900">SANTOSH VAULT</h1>
            <a href="index.html" class="text-xs font-semibold text-neutral-500 hover:text-neutral-900">Back to Dashboard</a>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-6 md:max-w-xl">
        <section class="bg-white p-5 rounded-2xl border border-neutral-200/70 shadow-xs">
            <h2 class="text-base font-bold text-neutral-900 mb-1">Upload Fleet Records / Tax Slips</h2>
            <p class="text-xs text-neutral-400 mb-4">The cron utility checks these entries daily and fires alerts starting 10 days before termination.</p>
            
            <form id="docForm" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-neutral-500 mb-1">Select Target Truck</label>
                    <select id="truckUploadSelect" class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-4 py-3 text-sm focus:outline-none" required>
                        <option value="">-- Choose Truck --</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-neutral-500 mb-1">Classification Type</label>
                        <select id="doc_type" class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-4 py-3 text-sm focus:outline-none">
                            <option value="Road Tax Copy">Road Tax Copy</option>
                            <option value="National Permit Paper">National Permit</option>
                            <option value="Fitness Certificate">Fitness Certificate</option>
                            <option value="Commercial Insurance">Commercial Insurance</option>
                            <option value="Pollution Receipt (PUC)">Pollution Receipt (PUC)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-neutral-500 mb-1">Termination/Expiry Date</label>
                        <input type="date" id="doc_expiry" class="w-full bg-neutral-50 border border-neutral-200 rounded-xl px-4 py-3 text-sm focus:outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-neutral-500 mb-1">Select Scanned Copy File</label>
                    <input type="file" id="doc_file" class="w-full text-xs text-neutral-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-neutral-100 file:text-neutral-700 hover:file:bg-neutral-200" required>
                </div>

                <button type="submit" class="w-full bg-neutral-900 text-white font-medium text-sm py-3 rounded-xl hover:bg-neutral-800 transition">Save Digital Copy</button>
            </form>
        </section>
    </main>

    <script>
        const API_URL = "http://localhost:5000/api";

        async function loadTrucks() {
            const res = await fetch(`${API_URL}/trucks`);
            const data = await res.json();
            const select = document.getElementById('truckUploadSelect');
            data.forEach(t => {
                select.innerHTML += `<option value="${t.truck_number}">${t.truck_number}</option>`;
            });
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        document.getElementById('docForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('doc_file').files[0];
            const base64String = await toBase64(fileInput);

            const payload = {
                truckNumber: document.getElementById('truckUploadSelect').value,
                documentType: document.getElementById('doc_type').value,
                expiryDate: document.getElementById('doc_expiry').value,
                fileBase64: base64String
            };

            const res = await fetch(`${API_URL}/docs/upload`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                alert('Vault registry updated! Document safely stored.');
                document.getElementById('docForm').reset();
            }
        });

        loadTrucks();
    </script>
</body>
</html>
